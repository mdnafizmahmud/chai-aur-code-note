<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      #insert {
        font-size: 2rem;
      }

      tr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2rem;
      }

      td {
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div id="insert">
      <div class="key">Press the key and watch the magic</div>
    </div>
  </body>
  <script>
    const insert = document.getElementById("insert");

    window.addEventListener("keydown", (e) => {
      insert.innerHTML = `
      <div >
        <table>
          <tr>
            <th>Key</th>
            <th>Keycode</th>
            <th>Code</th>
          </tr>
          <tr>
            <td>${e.key === " " ? "Space" : e.key}</td>
            <td>${e.keyCode}</td>
            <td>${e.code}</td>
          </tr>
        </table>
      </div>`;
    });
  </script>
</html>
