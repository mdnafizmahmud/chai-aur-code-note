<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project 04</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .container {
        width: 400px;
        text-align: center;
      }
      .title {
        font-size: 2rem;
        margin-bottom: 1rem;
      }
      .sub-title {
        font-size: 1.2rem;
        text-align: center;
        margin-bottom: 0.8rem;
      }
      form {
        margin-bottom: 1.5rem;
      }
      input {
        width: 150px;
        font-size: 1.2rem;
        padding: 0.2rem 0.5rem;
      }

      button {
        font-size: 1.2rem;
        padding: 0.2rem 0.5rem;
        cursor: pointer;
      }
      .result {
        font-size: 1rem;
        text-align: center;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1rem;
        text-align: center;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Guessing Game</h1>
      <h3 class="sub-title">Guess a number</h3>
      <form id="form" action="">
        <input
          type="text"
          id="guessField"
          class="guessField"
          min="1"
          max="5"
          required />
        <input
          type="submit"
          id="subt"
          value="Submit guess"
          class="guessSubmit" />
      </form>
      <p>Previous Guesses: <span class="guesses"></span></p>
      <p class="lowOrHi"></p>
      <p class="remain-text">
        Guesses Remainnig : <span class="lastResult" id="remain-num">10</span>
      </p>
    </div>
