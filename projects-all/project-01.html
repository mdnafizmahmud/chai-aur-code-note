<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 01</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .title {
        font-size: 2rem;
        color: black;
        text-align: center;
      }
      .colors {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        margin-top: 1.5rem;
      }
      .button {
        width: 5rem;
        height: 5rem;
        border: 2px solid #636363;
        outline: none;
        cursor: pointer;
        border-radius: 10px;
        font-size: 1.2rem;
      }
      #gray {
        background: gray;
        color: white;
      }
      #purple {
        background: purple;
        color: white;
      }
      #blue {
        background: blue;
        color: white;
      }
      #yellow {
        background: yellow;
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Color Scheme Switcher</h1>
      <div class="colors">
        <button class="button" id="gray">gray</button>
        <button class="button" id="purple">white</button>
        <button class="button" id="blue">blue</button>
        <button class="button" id="yellow">yellow</button>
      </div>
    </div>
    <script src="./script-01.js"></script>
  </body>
</html>
