<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 02</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .title {
        margin-bottom: 1.5rem;
      }
      .input {
        display: flex;
        align-items: center;
        justify-content: center;

        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      input {
        padding: 0.2rem 0.5rem;
        font-size: 1.1rem;
        outline: none;
        width: 10rem;
      }
      button {
        font-size: 1rem;
        padding: 0.2rem 0.5rem;
        border-radius: 5px;
        border: 1px solid #ddd;
        background: rgb(105, 220, 255);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-self: end;
        margin-bottom: 1.5rem;
      }
      #result {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
        color: rgb(39, 207, 104);
      }

      h2 {
        margin-bottom: 1rem;
      }
      .weight-guide p {
        text-align: left;
        margin-bottom: 0.6rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">BMI Calculator</h1>
      <form id="form" action="">
        <div class="input">
          <label for="height">Height in CM: </label>
          <input type="text" id="height" />
        </div>
        <div class="input">
          <label for="weight">Weight in KG: </label>
          <input type="text" id="weight" />
        </div>
        <button id="button" type="submit">Calculate</button>
        <p id="result"></p>
      </form>
      <div class="weight-guide">
        <h2>BMI Weight Guide</h2>
        <p>Under Weight = Less than 18.6</p>
        <p>Normal Range = 18.6 and 24.9</p>
        <p>Over Weight = Greater than 24.9</p>
      </div>
    </div>

    <script src="./script-02.js"></script>
  </body>
</html>
